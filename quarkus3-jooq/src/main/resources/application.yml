quarkus:
  datasource:
    db-kind: postgresql
    jdbc:
      telemetry: true
      max-size: 50
    devservices:
      image-name: ghcr.io/quarkusio/postgres-17-perf:main
  jackson:
    serialization-inclusion: non-empty
  rest:
    jackson:
      optimization:
        enable-reflection-free-serializers: true
  otel:
    logs:
      enabled: true
    metrics:
      enabled: true
    traces:
      sampler:
        ~: traceidratio
        arg: 0.1

"%prod":
  quarkus:
    datasource:
      username: fruits
      password: fruits
      jdbc:
        url: jdbc:postgresql://localhost:5432/fruits
